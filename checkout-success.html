<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tack för din beställning — Scent Privé</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      background: var(--bg);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .success-icon svg {
      width: 36px;
      height: 36px;
      stroke: #c9a96e;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .success-label {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--fg);
      margin: 0 0 16px;
      line-height: 1.2;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .success-text {
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--fg-muted);
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 40px;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .success-details {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px 32px;
      max-width: 400px;
      width: 100%;
      margin: 0 auto 40px;
      text-align: left;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .success-detail-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: var(--fg-muted);
    }

    .success-detail-row:last-child {
      border-bottom: none;
    }

    .success-detail-row svg {
      flex-shrink: 0;
      stroke: #c9a96e;
      stroke-width: 1.5;
      fill: none;
    }

    .success-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.6s ease both;
    }

    @keyframes fadeUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .success-order-id {
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin-top: 60px;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.6s 0.7s ease both;
    }
  </style>
</head>
<body>

  <nav id="navbar" class="scrolled">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo-text">SCENT PRIVÉ</a>
    </div>
  </nav>

  <main class="success-page">

    <div class="success-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <p class="success-label">Beställning bekräftad</p>
    <h1 class="success-title">Tack för ditt köp.</h1>
    <p class="success-text">
      Din beställning är mottagen och behandlas inom 24 timmar på vardagar.
      En bekräftelse skickas till din e-postadress.
    </p>

    <div class="success-details">
      <div class="success-detail-row">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
          <path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/>
        </svg>
        Din order är bekräftad
      </div>
      <div class="success-detail-row">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
          <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        Leverans 1–3 vardagar
      </div>
      <div class="success-detail-row">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.65A2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.16a16 16 0 006.93 6.93l1.52-1.52a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        Frågor? <a href="kontakt.html" style="color:#c9a96e; margin-left: 4px;">Kontakta oss</a>
      </div>
    </div>

    <div class="success-actions">
      <a href="kollektion.html" class="btn-outline">Se fler dofter</a>
      <a href="index.html" class="btn-primary">Till startsidan</a>
    </div>

    <p class="success-order-id" id="order-id-display"></p>

  </main>

  <script>
    // Clear cart after successful payment
    localStorage.removeItem('scentprive_cart');

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (sessionId) {
      // Show order reference
      const el = document.getElementById('order-id-display');
      if (el) el.textContent = 'Ordernummer: #' + sessionId.slice(-8).toUpperCase();

      // Send confirmation emails (customer + store)
      fetch('/api/send-confirmation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          console.log('Bekräftelsemejl skickade.');
        } else {
          console.warn('Mejl ej skickat:', data.error);
        }
      })
      .catch(err => console.error('Bekräftelsemejl fel:', err));
    }
  </script>

</body>
</html>
